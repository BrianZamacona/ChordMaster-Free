name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6 # v5.0.0
      - uses: subosito/flutter-action@v2 # v2.22.0
        with:
          flutter-version: '3.41.5'
          channel: 'stable'
          cache: true
      - name: Get dependencies
        run: flutter pub get
      - name: Analyze
        run: flutter analyze --no-fatal-infos
      - name: Run tests with coverage
        run: flutter test --coverage

