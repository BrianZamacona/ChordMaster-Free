name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: 'stable'
          cache: true
      - name: Get dependencies
        run: flutter pub get
      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs
      - name: Verify generated files are committed
        run: git diff --exit-code || (echo "Generated files are out of date. Run 'dart run build_runner build --delete-conflicting-outputs' and commit the results." && exit 1)
      - name: Analyze
        run: flutter analyze --no-fatal-infos
      - name: Run tests
        run: flutter test
