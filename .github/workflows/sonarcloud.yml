name: SonarCloud

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  sonarcloud:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check SonarCloud configuration
        id: sonar_ready
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
        run: |
          if [ -z "$SONAR_TOKEN" ] || [ -z "$SONAR_ORGANIZATION" ] || [ -z "$SONAR_PROJECT_KEY" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "SonarCloud skipped: configure SONAR_TOKEN secret plus SONAR_ORGANIZATION and SONAR_PROJECT_KEY repository variables."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v5 # v5.0.0
        if: steps.sonar_ready.outputs.enabled == 'true'
        with:
          fetch-depth: 0
      - uses: SonarSource/sonarqube-scan-action@v6 # v5.1.0
        if: steps.sonar_ready.outputs.enabled == 'true'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >-
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.sources=lib
            -Dsonar.tests=test
