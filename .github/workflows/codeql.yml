name: CodeQL

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '31 3 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        language: [actions]
    steps:
      - uses: actions/checkout@v5 # v5.0.0
      - uses: github/codeql-action/init@v4 # v3.28.16
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/analyze@v4 # v3.28.16
