# SonarQube/SonarCloud configuration for Flutter/Dart
# Docs: https://docs.sonarcloud.io/advanced-setup/analysis-parameters/
# This file helps SonarCloud analyze Dart/Flutter projects accurately.

# Project identifiers (override in workflow or UI if needed)
#sonar.projectKey=your_project_key
#sonar.organization=your_organization

# Project metadata
description=ChordMaster-Free Flutter app
sonar.projectVersion=1.0
sonar.language=dart
sonar.sourceEncoding=UTF-8

# Main source directories (Flutter convention)
sonar.sources=lib
sonar.tests=test

# Exclude generated, build, and asset files
sonar.exclusions=build/**,**/*.g.dart,**/*.freezed.dart,**/*.mocks.dart,**/*.gen.dart,lib/generated_plugin_registrant.dart,lib/**/generated/*.dart,lib/**/gen/*.dart,lib/**/mocks/*.dart,lib/**/test/*.dart,lib/**/test_*.dart,lib/**/test/**,lib/**/test_*.g.dart,lib/**/test_*.freezed.dart,lib/**/test_*.mocks.dart,lib/**/test_*.gen.dart,lib/**/test/generated/*.dart,lib/**/test/gen/*.dart,lib/**/test/mocks/*.dart

# Test file patterns
sonar.test.inclusions=test/**/*.dart

# Coverage report (if using coverage)
# To enable, run: flutter test --coverage
# Then uncomment the next line:
#sonar.dart.coverage.reportPaths=coverage/lcov.info

# Ignore asset/data/audio/image files
sonar.exclusions=assets/**,**/*.mp3,**/*.wav,**/*.ogg,**/*.json,**/*.png,**/*.jpg,**/*.jpeg,**/*.gif,**/*.webp

# Ignore build output and IDE files
sonar.exclusions=build/**,.dart_tool/**,.idea/**,.vscode/**

# Additional tuning (optional)
#sonar.verbose=true
#sonar.log.level=DEBUG
