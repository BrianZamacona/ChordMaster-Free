name: chordmaster_free
description: A free, offline music learning app with chords, tuner, metronome, ear training and more.
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  just_audio: ^0.9.39
  record: ^5.1.0
  permission_handler: ^11.3.1
  fl_chart: ^0.68.0
  lottie: ^3.1.0
  flutter_local_notifications: ^17.2.2
  url_launcher: ^6.3.0
  go_router: ^13.2.4
  google_fonts: ^6.2.1
  shared_preferences: ^2.2.3
  uuid: ^4.4.0
  intl: ^0.19.0
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/audio/
    - assets/images/