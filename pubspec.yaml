name: chordmaster_free
description: A free, offline music learning app with chords, tuner, metronome, ear training and more.
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: 3.3.1
  hive_flutter: 1.1.0
  hive: 2.2.3
  just_audio: 0.10.5
  record: 6.2.0
  permission_handler: 12.0.1
  fl_chart: 1.2.0
  lottie: 3.3.2
  flutter_local_notifications: 21.0.0
  url_launcher: 6.3.2
  go_router: 17.2.2
  google_fonts: 8.0.2
  shared_preferences: 2.5.5
  flutter_secure_storage: 10.0.0
  uuid: 4.5.3
  intl: 0.20.2
  audioplayers: 6.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 6.0.0
  mockito: 5.6.4

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/audio/
    - assets/images/
  