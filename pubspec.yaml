name: chordmaster_free
description: A free, offline music learning app with chords, tuner, metronome, ear training and more.
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: 2.6.1
  hive_flutter: 1.1.0
  hive: 2.2.3
  just_audio: 0.9.46
  record: 5.2.1
  permission_handler: 11.4.0
  fl_chart: 0.68.0
  lottie: 3.3.2
  flutter_local_notifications: 17.2.4
  url_launcher: 6.3.2
  go_router: 13.2.5
  google_fonts: 6.3.3
  shared_preferences: 2.5.4
  flutter_secure_storage: 9.2.4
  uuid: 4.5.3
  intl: 0.20.2
  audioplayers: 6.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 4.0.0
  mockito: 5.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/audio/
    - assets/images/